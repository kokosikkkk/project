<!--шаблон базовой страницы-->
{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'website/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class%}{%endblock%}">
    <button class="menu-btn" type="button" data-bs-toggle="offcanvas"  data-bs-target="#offcanvasRight">
        Меню
    </button>
    

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Навигация</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
        </div>
        <div class="offcanvas-body">
            <div class="sidebar-btns">
                <a href="{%url 'tasks' %}"> Задачи</a>
                <a href="{%url 'statistics' %}"> Статистика</a>
                <a href="{%url 'profile' %}"> Профиль</a>
            </div>
            <div class="logout-btn">
                <a href="{%url 'logout' %}" class="logout">Выйти</a>
            </div>
        </div>
    </div>

{% block content %}
{% endblock %}
{%block extra_js%}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
